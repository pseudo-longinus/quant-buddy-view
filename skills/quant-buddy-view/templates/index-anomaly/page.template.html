<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>__PAGE_TITLE__</title>
<!--
  指数成分股异动监控模板（bespoke 页面）。
  这是一个“场景模板”，不写死任何具体指数：
    用户说「做个沪深300异动监控」「中证500今天哪些股异动」「上证50异动榜」
    → 套这个模板，改 CONFIG + INDEX + 文案即可。
  生成前替换 CONFIG、INDEX 与标题占位；发布前用 scripts/compile_bespoke_page.py 内联公共 shell 与运行时资产。
-->
<style>
  :root{
    /* 终端深色盘面（页面主体保持深色，与 share 外壳风格一致）*/
    --bg:#0e141c; --bg2:#0b1119; --panel:#161f2b; --panel2:#1b2735;
    --line:#26323f; --ink:#e4ecf4; --mut:#8a97a7; --dim:#5c6776;
    --up:#ef4f56; --upbg:rgba(239,79,86,.14);
    --dn:#23b07a; --dnbg:rgba(35,176,122,.14);
    --gold:#cba14a; --blue:#5b9bd5;
    /* QuantBuddy 品牌外壳 */
    --brand:#101827; --brand-ink:#e8eef7; --brand-mut:#9fb0c6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei",-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased}
  .mono{font-family:"SF Mono","Roboto Mono","Consolas",ui-monospace,monospace;
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  a{color:inherit;text-decoration:none}

  .wrap{max-width:1180px;margin:0 auto;padding:26px 26px 56px}

  /* ===== hero 能力标签条 ===== */
  .hero{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:20px}
  .tag{font-size:11px;letter-spacing:.4px;padding:5px 11px;border-radius:999px;
    border:1px solid var(--line);color:var(--mut);background:var(--panel)}
  .tag.kind{color:var(--gold);border-color:rgba(203,161,74,.4)}
  .tag.gen{color:#0e141c;background:var(--gold);border-color:var(--gold);font-weight:700}

  /* ---- masthead ---- */
  .mast{display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:2px solid var(--gold);padding-bottom:14px;margin-bottom:22px;flex-wrap:wrap;gap:18px}
  .kicker{font-size:11px;letter-spacing:3.5px;color:var(--gold);font-weight:600;margin-bottom:6px}
  .title{font-family:"Songti SC",Georgia,"Times New Roman",serif;font-size:33px;font-weight:700;letter-spacing:1px}
  .title small{font-size:15px;color:var(--mut);font-weight:400;margin-left:8px;letter-spacing:0}
  .mast-r{text-align:right;display:flex;align-items:flex-start;gap:14px}
  .asof{font-size:12px;color:var(--mut)}
  .asof b{color:var(--ink)}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:7px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn[disabled]{opacity:.5;cursor:wait}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--dn);box-shadow:0 0 7px var(--dn)}

  /* ---- overview strip ---- */
  .strip{display:grid;grid-template-columns:1.15fr 1.85fr;gap:16px;margin-bottom:22px}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:10px}
  .idx{padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
  .idx .lab{font-size:12.5px;color:var(--mut);margin-bottom:4px}
  .idx .nm{font-size:16px;font-weight:600}
  .idx .px{font-size:13px;color:var(--mut);margin-top:3px}
  .idx-r{text-align:right}
  .idx .chg{font-size:34px;font-weight:700;line-height:1}
  .idx .spk{margin-top:6px}

  .breadth{padding:16px 20px}
  .breadth .hd{font-size:12.5px;color:var(--mut);margin-bottom:12px;display:flex;justify-content:space-between}
  .bbar{height:13px;border-radius:7px;overflow:hidden;display:flex;background:#202c3a;margin-bottom:12px}
  .bbar i{display:block;height:100%}
  .bstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
  .bstats .v{font-size:22px;font-weight:700;line-height:1.1}
  .bstats .k{font-size:11px;color:var(--mut);margin-top:3px}

  /* ---- panel grid ---- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .pnl{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
  .pnl-hd{padding:13px 16px 11px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline}
  .pnl-hd .t{font-size:15px;font-weight:700}
  .pnl-hd .t .ic{margin-right:6px}
  .pnl-hd .s{font-size:11px;color:var(--dim)}
  .rows{padding:6px 0}
  .row{display:flex;align-items:center;gap:9px;padding:6px 16px;position:relative}
  .row .rk{width:16px;text-align:center;font-size:12px;color:var(--dim);font-weight:600}
  .row .nm{flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:13.5px}
  .row .code{font-size:10.5px;color:var(--dim);margin-left:5px}
  .row .val{font-size:13.5px;font-weight:700;text-align:right;min-width:62px;z-index:1}
  .row .bar{position:absolute;left:0;top:0;bottom:0;opacity:.10;z-index:0}
  .up{color:var(--up)} .dn{color:var(--dn)} .gd{color:var(--gold)} .bl{color:var(--blue)}
  .bar-up{background:var(--up)} .bar-dn{background:var(--dn)} .bar-gd{background:var(--gold)} .bar-bl{background:var(--blue)}

  .pnl.loading{min-height:348px}
  .pnl.loading .pnl-hd .t{display:flex;align-items:center;gap:8px}
  .load-dot{width:7px;height:7px;border-radius:999px;background:var(--gold);box-shadow:0 0 10px rgba(203,161,74,.5)}
  .bone{display:block;border-radius:999px;background:linear-gradient(90deg,#223043 0%,#314058 38%,#223043 76%);background-size:220% 100%;animation:shimmer 1.25s ease-in-out infinite}
  .row.loading-row{height:29px}
  .row.loading-row .rk{color:rgba(143,159,182,.5)}
  .row.loading-row .nm{display:flex;align-items:center;gap:8px}
  .row.loading-row .val{display:flex;justify-content:flex-end}
  .load-name{width:52%;height:10px}
  .load-code{width:30px;height:8px;opacity:.55}
  .load-val{width:50px;height:10px}
  .idx-load-value{width:100px;height:16px;margin-left:auto}
  .bbar.is-loading{position:relative;background:#202c3a}
  .bbar.is-loading:after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(90deg,transparent,#34465f,transparent);animation:shimmer 1.25s ease-in-out infinite}
  .loading-muted{color:var(--dim)}
  @keyframes shimmer{0%{background-position:120% 0}100%{background-position:-120% 0}}

  .err{background:var(--upbg);border:1px solid var(--up);color:#ffb9bc;padding:11px 16px;border-radius:8px;margin-bottom:18px;font-size:13px;display:none}
  .skel{opacity:.45}
  @media(max-width:880px){
    .grid{grid-template-columns:1fr}.strip{grid-template-columns:1fr}.title{font-size:26px}
  }

.mast-meta{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
@media (max-width:880px){
  .mast-r{gap:0}
}
</style>
<!-- QB_SHARED_SHELL_CSS -->
</head>
<body>

<!-- QB_SHARED_SHELL_HEADER -->

<div class="wrap">

  <div class="hero">
    <span class="tag kind">个股异动</span>
    <span class="tag gen">Agent + Skill 生成</span>
    <span class="tag">实时 HTML</span>
  </div>

  <div class="mast">
    <div>
      <div class="kicker" id="kicker">QUANTBUDDY · 实时取数看板</div>
      <div class="title" id="title">__INDEX_NAME__ · 成分股异动监控<small id="title-en">__INDEX_EN__</small></div>
    </div>
    <div class="mast-r">
      <div class="mast-meta">
        <div class="asof">数据截至 <b id="asof">—</b> · 收盘口径</div>
      </div>
    </div>
  </div>

  <div class="err" id="err"></div>

  <!-- overview -->
  <div class="strip">
    <div class="card idx">
      <div>
        <div class="lab">基准指数</div>
        <div class="nm" id="idxname">__INDEX_NAME__</div>
        <div class="px mono" id="idxpx">—</div>
      </div>
      <div class="idx-r">
        <div class="chg mono" id="idxchg">—</div>
        <div class="spk" id="idxspk"></div>
      </div>
    </div>
    <div class="card breadth">
      <div class="hd"><span id="breadthtitle">成分股涨跌分布</span><span id="breadthnote">—</span></div>
      <div class="bbar" id="bbar"></div>
      <div class="bstats">
        <div><div class="v up mono" id="b_adv">—</div><div class="k">上涨</div></div>
        <div><div class="v dn mono" id="b_dec">—</div><div class="k">下跌</div></div>
        <div><div class="v up mono" id="b_lu">—</div><div class="k">涨幅&gt;9.9%</div></div>
        <div><div class="v dn mono" id="b_ld">—</div><div class="k">跌幅&gt;9.9%</div></div>
      </div>
    </div>
  </div>

  <!-- panels -->
  <div class="grid" id="grid"></div>
  <!-- QB_SHARED_SHELL_FOOTER -->
</div>

<!-- QB_SHARED_SHELL_MODAL -->

<!-- QB_SHARED_QR_MINI -->
<!-- QB_DATA_KERNEL -->
<!-- QB_SHARED_SHELL_JS -->
<script>
/* ============================================================
   CONFIG：本次生成时填入真实公式任务包凭证。
   signature 不要在面向最终用户的对话里展示；内联进已发布 HTML 是允许的。
   ============================================================ */
const CONFIG = {
  endpoint: "https://www.quantbuddy.cn/skill",
  package_id: "pkg_xxxxxxxx",
  signature: "replace_with_signature"
};

/* INDEX：本次监控的指数 / 成分股票池口径。
   COUNT 用于涨跌分布里的“平盘 = COUNT − 涨 − 跌”兜底估算（无成分总数时可设为 0 关闭）。 */
const INDEX = { name: "__INDEX_NAME__", count: __INDEX_COUNT__ };

/* 异动面板定义。key 必须与公式包 output 名一致，read_mode = last_day_stats（取 top_values 榜单）。
   - GAIN/LOSE：涨跌幅榜（LOSE 显示为负号）
   - TURN：换手率   - VOLR：量比   - AMP：振幅
   增删/改面板时，同步调整公式包 outputs 即可，渲染逻辑无需改。 */
const PANELS = [
  {key:'GAIN', title:'涨幅榜',  ic:'▲', sub:'当日涨幅 Top10',   unit:'%', cls:'up', bar:'bar-up', disp:v=>sgn(v,2)},
  {key:'LOSE', title:'跌幅榜',  ic:'▼', sub:'当日跌幅 Top10',   unit:'%', cls:'dn', bar:'bar-dn', disp:v=>sgn(-v,2)},
  {key:'TURN', title:'换手异动',ic:'◆', sub:'换手率 Top10',     unit:'%', cls:'gd', bar:'bar-gd', disp:v=>(+v).toFixed(2)},
  {key:'VOLR', title:'放量异动',ic:'◆', sub:'量比(5日) Top10',  unit:'×', cls:'gd', bar:'bar-gd', disp:v=>(+v).toFixed(2)},
  {key:'AMP',  title:'振幅异动',ic:'◆', sub:'当日振幅 Top10',   unit:'%', cls:'bl', bar:'bar-bl', disp:v=>(+v).toFixed(2)},
];
let currentOutputs = null, currentAsof = "—";

const $ = s => document.querySelector(s);
function sgn(x,d=2){return (x>=0?'+':'')+(+x).toFixed(d);}
function refreshButtonLabel(btn){ return btn ? (btn.querySelector(".action-label") || btn) : {textContent:""}; }

function spark(pairs,{w=190,h=40}={}){
  const vals=pairs.map(p=>p.v);if(vals.length<2)return'';
  let mn=Math.min(...vals),mx=Math.max(...vals);const pad=(mx-mn)*0.12||1;mn-=pad;mx+=pad;
  const X=i=>(i/(vals.length-1))*w,Y=v=>h-((v-mn)/(mx-mn))*h;
  const line=vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const area=`${X(0)},${h} ${line} ${X(vals.length-1)},${h}`;
  const up=vals[vals.length-1]>=vals[0];const c=up?'#ef4f56':'#23b07a';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${c}" stop-opacity=".30"/><stop offset="1" stop-color="${c}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#sg)"/>
    <polyline points="${line}" fill="none" stroke="${c}" stroke-width="1.6" stroke-linejoin="round"/></svg>`;
}

function renderLoadingPanels(){
  const g=$('#grid');g.innerHTML='';
  const rows=Array.from({length:10},(_,i)=>`<div class="row loading-row">
    <span class="rk">${i+1}</span>
    <span class="nm"><span class="bone load-name"></span><span class="bone load-code"></span></span>
    <span class="val"><span class="bone load-val"></span></span>
  </div>`).join('');
  for(const p of PANELS){
    g.insertAdjacentHTML('beforeend',`<div class="pnl loading">
      <div class="pnl-hd"><div class="t"><span class="load-dot"></span>${p.title}</div><div class="s">公式包取数中</div></div>
      <div class="rows">${rows}</div></div>`);
  }
}

function renderOverviewLoading(){
  $('#asof').textContent='连接中';
  $('#idxchg').innerHTML='<span class="bone idx-load-value"></span>';
  $('#idxchg').className='chg mono loading-muted';
  $('#idxpx').textContent='等待最新收盘口径';
  $('#idxspk').innerHTML='<span class="bone" style="width:150px;height:28px"></span>';
  $('#breadthnote').textContent='公式包取数中';
  $('#bbar').classList.add('is-loading');
  $('#bbar').innerHTML='';
  for(const id of ['b_adv','b_dec','b_lu','b_ld']){$('#'+id).textContent='…';}
}

function renderPanels(o){
  const g=$('#grid');g.innerHTML='';
  for(const p of PANELS){
    const rows=QB.topValues(o,p.key).slice(0,10);
    const mx=Math.max(...rows.map(r=>Math.abs(r.value)),1e-9);
    const body=rows.map((r,i)=>{
      const w=(Math.abs(r.value)/mx*100).toFixed(1);
      const code=(r.asset||'').replace(/^(SH|SZ|BJ)/,'');
      return `<div class="row">
        <span class="bar ${p.bar}" style="width:${w}%"></span>
        <span class="rk">${i+1}</span>
        <span class="nm">${r.name||r.asset}<span class="code mono">${code}</span></span>
        <span class="val mono ${p.cls}">${p.disp(r.value)}<span style="font-size:10px;opacity:.6">${p.unit}</span></span>
      </div>`;
    }).join('')||`<div class="row" style="color:var(--dim)">暂无数据</div>`;
    g.insertAdjacentHTML('beforeend',`<div class="pnl">
      <div class="pnl-hd"><div class="t"><span class="ic ${p.cls}">${p.ic}</span>${p.title}</div><div class="s">${p.sub}</div></div>
      <div class="rows">${body}</div></div>`);
  }
}

function renderOverview(o){
  const chg=QB.lastValue(o,'IDXRET');
  const date=QB.statDate(o,'GAIN')||QB.lastDate(o,'IDXRET');
  currentAsof=QB.fmtDate(date,'.');
  $('#asof').textContent=currentAsof;
  const ce=$('#idxchg');
  if(chg!=null){ce.textContent=sgn(chg,2)+'%';ce.className='chg mono '+(chg>=0?'up':'dn');}
  const px=QB.series(o,'IDXPX',{dropZero:true});
  if(px.length){$('#idxpx').textContent=px[px.length-1].v.toFixed(2)+' 点';$('#idxspk').innerHTML=spark(px);}
  const adv=QB.lastValue(o,'ADV')||0,dec=QB.lastValue(o,'DEC')||0,lu=QB.lastValue(o,'LU')||0,ld=QB.lastValue(o,'LD')||0;
  const flat=INDEX.count?Math.max(INDEX.count-adv-dec,0):0,tot=adv+dec+flat||1;
  $('#b_adv').textContent=adv;$('#b_dec').textContent=dec;$('#b_lu').textContent=lu;$('#b_ld').textContent=ld;
  $('#breadthnote').innerHTML=`涨跌比 <b style="color:var(--ink)">${dec?(adv/dec).toFixed(2):'—'}</b>`;
  $('#bbar').classList.remove('is-loading');
  $('#bbar').innerHTML=
    `<i class="bar-up" style="width:${adv/tot*100}%"></i>`+
    `<i style="width:${flat/tot*100}%;background:#3a4654"></i>`+
    `<i class="bar-dn" style="width:${dec/tot*100}%"></i>`;
}


async function load(){
  const btn=$('#refresh'),bt=refreshButtonLabel(btn),dot=$('#dot'),err=$('#err');
  if(btn) btn.disabled=true;bt.textContent='取数中';err.style.display='none';
  if(!$('#grid').children.length){renderOverviewLoading();renderLoadingPanels();}
  try{
    const o=await QB.query(CONFIG);
    currentOutputs=o;
    renderOverview(o);renderPanels(o);
    if(dot){dot.style.background='var(--dn)';dot.style.boxShadow='0 0 7px var(--dn)';}bt.textContent='刷新数据';
  }catch(e){
    err.style.display='block';err.textContent='取数失败：'+e.message+'　（请检查网络或公式任务包是否有效）';
    if(dot){dot.style.background='var(--up)';dot.style.boxShadow='0 0 7px var(--up)';}bt.textContent='重试';
  }finally{if(btn) btn.disabled=false;}
}
function posterRows(key){ return currentOutputs ? QB.topValues(currentOutputs,key).slice(0,5) : []; }
function getPosterData(){
  const gain=posterRows('GAIN'), lose=posterRows('LOSE'), turn=posterRows('TURN');
  return {
    headline:($('#title') ? $('#title').textContent : INDEX.name + '成分股异动监控'),
    summary:'成分股涨跌分布、涨跌幅榜、换手与放量异动，打开页面实时取数。',
    metrics:[
      {label:'指数涨跌',value:$('#idxchg')?$('#idxchg').textContent:'—',sub:'收盘口径'},
      {label:'上涨',value:$('#b_adv')?$('#b_adv').textContent:'—',sub:'成分数量'},
      {label:'下跌',value:$('#b_dec')?$('#b_dec').textContent:'—',sub:'成分数量'},
      {label:'涨停附近',value:$('#b_lu')?$('#b_lu').textContent:'—',sub:'涨幅>9.9%'},
      {label:'跌停附近',value:$('#b_ld')?$('#b_ld').textContent:'—',sub:'跌幅>9.9%'},
      {label:'数据日期',value:currentAsof,sub:'实时更新'}
    ],
    sections:[
      {title:'涨幅榜',type:'list',items:gain.map(r=>({label:r.name||r.asset,value:sgn(r.value,2)+'%',color:'#ef4f56'})),height:190},
      {title:'跌幅榜',type:'list',items:lose.map(r=>({label:r.name||r.asset,value:sgn(-r.value,2)+'%',color:'#23b07a'})),height:190},
      {title:'换手异动',type:'list',items:turn.map(r=>({label:r.name||r.asset,value:(+r.value).toFixed(2)+'%',color:'#d5aa49'})),height:190}
    ],
    asof:currentAsof
  };
}
QBShareShell.init({templateName:'成分股异动榜',onRefresh:load,getPosterData:getPosterData,title:()=>$('#title')?$('#title').textContent:document.title,asof:()=>currentAsof});
load();

</script>
</body>
</html>
