<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宽宝活卡 smoke</title>
  <!-- QB_LIVE_CARD_CSS -->
</head>
<body>
  <main>
    <section class="essence-section" id="essenceSection" hidden>
      <article class="essence-card" id="essenceCard" data-qb-live-card data-theme="red">
        <div class="live-card-meta">
          <span data-qb-live-card-brand></span>
          <time data-qb-live-card-date datetime="2026-07-01">2026-07-01</time>
        </div>
        <h1 data-qb-live-card-title>涨跌停结构一眼看懂</h1>
        <p data-qb-live-card-description>涨停端占优，炸板压力较轻，短线情绪保持偏热。</p>
        <section class="live-card-core-grid" data-qb-live-card-core>
          <div class="live-card-primary">
            <div class="live-card-primary-value">72</div>
            <div class="live-card-primary-label">明显偏热</div>
          </div>
          <div class="live-card-panel">
            <div class="live-card-metric-grid">
              <div class="live-card-metric" data-qb-live-card-metric="0"><b>172 / 24</b><span>涨停 / 跌停</span></div>
              <div class="live-card-metric" data-qb-live-card-metric="1"><b>+148</b><span>净额</span></div>
              <div class="live-card-metric" data-qb-live-card-metric="2"><b>25.5%</b><span>炸板率</span></div>
            </div>
          </div>
        </section>
        <div class="live-card-tags">
          <span class="live-card-tag">情绪偏热</span>
          <span class="live-card-tag">涨停占优</span>
          <span class="live-card-tag">2板高度</span>
        </div>
      </article>
    </section>
    <section>
      <h2>完整页面内容</h2>
      <p>默认页面不显示宽宝活卡。</p>
    </section>
  </main>
  <!-- QB_LIVE_CARD_JS -->
  <script>QBLiveCard.applyVisibility();</script>
</body>
</html>
